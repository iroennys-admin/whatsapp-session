<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WhatsApp Session</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #075e54; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border-radius: 16px; padding: 2rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,.3); text-align: center; }
  h1 { color: #075e54; font-size: 1.4rem; margin-bottom: .3rem; }
  .sub { color: #667; font-size: .9rem; margin-bottom: 1.5rem; }
  .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-bottom: .8rem; }
  .btn-primary { background: #25d366; color: #fff; }
  .btn-primary:hover { background: #1da851; }
  .btn-secondary { background: #128c7e; color: #fff; }
  .btn-secondary:hover { background: #075e54; }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .output { margin-top: 1rem; padding: 1rem; border-radius: 8px; background: #f5f5f5; font-size: .95rem; word-break: break-all; }
  .output img { max-width: 240px; margin: .5rem auto; display: block; }
  .code { font-size: 2rem; font-weight: bold; letter-spacing: 4px; color: #128c7e; }
  input[type=tel] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; margin-bottom: .8rem; text-align: center; }
  input[type=tel]:focus { outline: none; border-color: #25d366; }
  .status { font-size: .85rem; color: #667; margin-top: .5rem; }
  .hidden { display: none; }
  .tab-bar { display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid #eee; }
  .tab { flex: 1; padding: 10px; cursor: pointer; font-weight: 600; color: #999; border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .tab.active { color: #075e54; border-bottom-color: #25d366; }
</style>
</head>
<body>
<div class="card">
  <h1>📱 WhatsApp Session</h1>
  <p class="sub">Generá una sesion para tu bot</p>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('qr')">📷 Código QR</div>
    <div class="tab" onclick="switchTab('pair')">🔢 Código Pairing</div>
  </div>

  <!-- QR Tab -->
  <div id="tab-qr">
    <button class="btn btn-primary" id="btnqr" onclick="startQR()">🔄 Generar QR</button>
    <div id="qr-output" class="output hidden">
      <p style="font-size:.8rem;color:#667">Escanéá este código con WhatsApp</p>
      <div id="qr-img"></div>
      <div class="status" id="qr-status">Esperando escaneo...</div>
    </div>
    <a id="dl-creds-qr" class="hidden" style="display:inline-block;margin-top:.5rem;color:#25d366;font-weight:600" href="#">⬇ Descargar creds.json</a>
  </div>

  <!-- Pair Tab -->
  <div id="tab-pair" class="hidden">
    <input type="tel" id="phone-input" placeholder="Ej: 5215539356057" autocomplete="off">
    <button class="btn btn-secondary" id="btnpair" onclick="startPair()">🔗 Obtener código</button>
    <div id="pair-output" class="output hidden">
      <p style="font-size:.8rem;color:#667">Ingresá este código en WhatsApp<br>→ Dispositivos vinculados → Vincular con número</p>
      <div class="code" id="pair-code"></div>
      <div class="status" id="pair-status">Conectando...</div>
    </div>
    <a id="dl-creds-pair" class="hidden" style="display:inline-block;margin-top:.5rem;color:#25d366;font-weight:600" href="#">⬇ Descargar creds.json</a>
  </div>
</div>

<script>
let sessionId = null;
let eventSource = null;

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.includes(tab==='qr'?'QR':'Pairing')));
  document.getElementById('tab-qr').classList.toggle('hidden', tab !== 'qr');
  document.getElementById('tab-pair').classList.toggle('hidden', tab !== 'pair');
}

async function startQR() {
  const btn = document.getElementById('btnqr');
  btn.disabled = true; btn.textContent = '⏳ Generando...';
  document.getElementById('qr-output').classList.remove('hidden');
  document.getElementById('qr-status').textContent = 'Iniciando sesión...';
  document.getElementById('dl-creds-qr').classList.add('hidden');

  if (eventSource) eventSource.close();

  const res = await fetch('/api/start', { method: 'POST' });
  const data = await res.json();
  sessionId = data.id;

  eventSource = new EventSource(`/api/stream/${sessionId}`);
  eventSource.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'qr') {
      document.getElementById('qr-img').innerHTML = `<img src="${msg.qr}" alt="QR">`;
      document.getElementById('qr-status').textContent = '📷 Escaneá el código con WhatsApp';
    }
    if (msg.type === 'connected') {
      document.getElementById('qr-status').textContent = '✅ Conectado!';
      btn.disabled = false; btn.textContent = '🔄 Generar QR';
      const dl = document.getElementById('dl-creds-qr');
      dl.href = `/api/creds/${sessionId}`;
      dl.classList.remove('hidden');
      eventSource.close();
    }
    if (msg.type === 'error') {
      document.getElementById('qr-status').textContent = `❌ ${msg.error}`;
      btn.disabled = false; btn.textContent = '🔄 Generar QR';
    }
  };
  eventSource.onerror = () => {
    document.getElementById('qr-status').textContent = '⚠️ Error de conexión';
    btn.disabled = false; btn.textContent = '🔄 Reintentar';
  };
}

async function startPair() {
  const phone = document.getElementById('phone-input').value.trim();
  if (!phone) return alert('Ingresá un número de teléfono');
  const btn = document.getElementById('btnpair');
  btn.disabled = true; btn.textContent = '⏳ Obteniendo código...';
  document.getElementById('pair-output').classList.remove('hidden');
  document.getElementById('pair-status').textContent = 'Solicitando código...';
  document.getElementById('dl-creds-pair').classList.add('hidden');

  if (eventSource) eventSource.close();

  try {
    const res = await fetch('/api/pair', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    });
    const data = await res.json();
    if (data.error) { alert(data.error); btn.disabled = false; btn.textContent = '🔗 Obtener código'; return; }
    sessionId = data.id;
    document.getElementById('pair-code').textContent = data.pairingCode;
    document.getElementById('pair-status').textContent = '⏳ Esperando vinculación...';

    eventSource = new EventSource(`/api/stream/${sessionId}`);
    eventSource.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'connected') {
        document.getElementById('pair-status').textContent = '✅ Conectado!';
        btn.disabled = false; btn.textContent = '🔗 Obtener código';
        const dl = document.getElementById('dl-creds-pair');
        dl.href = `/api/creds/${sessionId}`;
        dl.classList.remove('hidden');
        eventSource.close();
      }
      if (msg.type === 'error') {
        document.getElementById('pair-status').textContent = '❌ ' + msg.error;
        btn.disabled = false; btn.textContent = '🔗 Obtener código';
      }
    };
  } catch (e) {
    alert('Error: ' + e.message);
    btn.disabled = false; btn.textContent = '🔗 Obtener código';
  }
}
</script>
</body>
</html>
